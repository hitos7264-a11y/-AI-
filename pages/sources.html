<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<meta name="theme-color" content="#0b0d14">
<title>出典一覧（109件） ― 日本AI基盤モデル開発</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/pages.css">
</head>
<body>

<div data-mount="header"></div>
<div data-mount="drawer"></div>

<main>
  <div class="container">

    <header class="page-header anim-fade-up">
      <nav class="breadcrumbs">
        <a href="../index.html">ホーム</a><span class="sep">/</span><span>出典一覧</span>
      </nav>
      <div class="page-header__kicker">SOURCES / REFERENCES</div>
      <h1>出典一覧<br><small style="font-size:14px; font-weight:400; color:var(--c-text-dim);">109件を9カテゴリに分類</small></h1>
      <p class="page-header__lead">
        本レポートの調査で参照・精読した出典元を<span class="hl">フルURL付き</span>ですべて公開。
      </p>
    </header>

    <!-- 検索 -->
    <div class="source-filter anim-fade-up">
      <div class="source-search">
        <i class="fa-solid fa-search"></i>
        <input type="text" id="js-source-search" placeholder="媒体・タイトル・URLで検索…">
      </div>
      <div class="scroll-tabs" id="js-source-tabs">
        <button class="scroll-tab is-active" data-filter="all">すべて</button>
        <button class="scroll-tab" data-filter="0">主要日本語</button>
        <button class="scroll-tab" data-filter="1">分析記事</button>
        <button class="scroll-tab" data-filter="2">株式・金融</button>
        <button class="scroll-tab" data-filter="3">英語メディア</button>
        <button class="scroll-tab" data-filter="4">政府・公的</button>
        <button class="scroll-tab" data-filter="5">SB関連</button>
        <button class="scroll-tab" data-filter="6">PFN</button>
        <button class="scroll-tab" data-filter="7">DC・インフラ</button>
        <button class="scroll-tab" data-filter="8">SNS・動画</button>
      </div>
    </div>

    <section class="sect-sm">
      <div id="js-sources-host"></div>
    </section>

    <section class="sect-sm">
      <div class="callout anim-fade-up">
        <i class="fa-solid fa-book-bookmark"></i>
        <div>
          <strong>クロスチェック方針</strong><br>
          本文執筆にあたって特に深く精読した一次ソース（深堀りクロール対象）は、レポート中で示した主要な事実関係（企業設立日、法人登記情報、丹波氏の退任、NEDO公募、データセンター仕様、株式市場反応など）の裏付けとして、複数ソース間でクロスチェックを行った上で採用。
        </div>
      </div>
    </section>

    <nav class="page-nav">
      <a href="companies.html" class="page-nav__link">
        <small><i class="fa-solid fa-chevron-left"></i> 前へ</small>
        <strong>企業一覧</strong>
      </a>
      <a href="faq.html" class="page-nav__link next">
        <small>次へ <i class="fa-solid fa-chevron-right"></i></small>
        <strong>FAQ</strong>
      </a>
    </nav>

  </div>
</main>

<button class="to-top" aria-label="トップへ戻る"><i class="fa-solid fa-arrow-up"></i></button>
<div data-mount="bottomnav"></div>
<div data-mount="footer"></div>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  (function(){
    var host = document.getElementById('js-sources-host');
    var searchInput = document.getElementById('js-source-search');
    var currentFilter = 'all';
    var currentQuery = '';

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, function(m){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
      });
    }

    function render(){
      var q = currentQuery.toLowerCase();
      host.innerHTML = SITE_DATA.sources.map(function(sec, idx){
        if (currentFilter !== 'all' && String(idx) !== currentFilter) return '';
        var filtered = sec.items.filter(function(it){
          if (!q) return true;
          return (it.media + ' ' + it.title + ' ' + it.url).toLowerCase().indexOf(q) !== -1;
        });
        if (filtered.length === 0) return '';
        return '<div class="source-section anim-fade-up">' +
                 '<div class="source-section__title">' +
                   '<i class="fa-solid ' + sec.icon + '"></i> ' +
                   escapeHtml(sec.category) +
                   '<span class="source-section__count">' + filtered.length + '件</span>' +
                 '</div>' +
                 '<div class="source-list">' +
                   filtered.map(function(it){
                     return '<a href="' + it.url + '" target="_blank" rel="noopener noreferrer" class="source-card">' +
                              '<div class="source-card__icon"><i class="fa-solid fa-up-right-from-square"></i></div>' +
                              '<div style="flex:1; min-width:0;">' +
                                '<div class="source-card__media">' + escapeHtml(it.media) + '</div>' +
                                '<div class="source-card__title">' + escapeHtml(it.title) + '</div>' +
                                '<div class="source-card__url">' + escapeHtml(it.url) + '</div>' +
                              '</div>' +
                            '</a>';
                   }).join('') +
                 '</div>' +
               '</div>';
      }).join('');
      setTimeout(function(){
        document.querySelectorAll('.anim-fade-up').forEach(function(el){ el.classList.add('is-visible'); });
      }, 30);
    }

    render();

    searchInput.addEventListener('input', function(e){
      currentQuery = e.target.value;
      render();
    });

    document.querySelectorAll('#js-source-tabs .scroll-tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        document.querySelectorAll('#js-source-tabs .scroll-tab').forEach(function(t){ t.classList.remove('is-active'); });
        tab.classList.add('is-active');
        currentFilter = tab.dataset.filter;
        render();
      });
    });
  })();
  JAFM.init('sources', 'sources');
</script>
</body>
</html>

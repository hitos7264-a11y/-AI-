<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="日本AI基盤モデル開発に関するFAQ。なぜ四社連合か、なぜ1兆パラメーターか、SBの矛盾は、100人体制で足りるか、など。">
<meta name="theme-color" content="#0b0d14">
<title>FAQ ― 日本AI基盤モデル開発</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Serif+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/layout.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/pages.css">
</head>
<body>

<div data-mount="header"></div>
<div data-mount="drawer"></div>

<main>
  <div class="container">

    <header class="page-header anim-fade-up">
      <nav class="breadcrumbs">
        <a href="../index.html">ホーム</a><span class="sep">/</span><span>FAQ</span>
      </nav>
      <div class="page-header__kicker">FAQ</div>
      <h1>よくある質問</h1>
      <p class="page-header__lead">
        この国家プロジェクトをめぐる<span class="hl">本質的な疑問</span>に答える。
      </p>
    </header>

    <section class="sect-sm">
      <div class="accordion anim-fade-up" id="js-faq"></div>
    </section>

    <section class="sect-sm">
      <div class="callout callout-gold anim-fade-up">
        <i class="fa-solid fa-lightbulb"></i>
        <div>
          <strong>さらに深く知りたい方へ</strong><br>
          全15章の詳細記事、完全年表、出典109件が揃っています。気になる疑問から深堀りしてください。
        </div>
      </div>
    </section>

    <nav class="page-nav">
      <a href="sources.html" class="page-nav__link">
        <small><i class="fa-solid fa-chevron-left"></i> 前へ</small>
        <strong>出典一覧</strong>
      </a>
      <a href="../index.html" class="page-nav__link next">
        <small>ホームへ <i class="fa-solid fa-chevron-right"></i></small>
        <strong>トップページ</strong>
      </a>
    </nav>

  </div>
</main>

<button class="to-top" aria-label="トップへ戻る"><i class="fa-solid fa-arrow-up"></i></button>
<div data-mount="bottomnav"></div>
<div data-mount="footer"></div>

<script src="../js/data.js"></script>
<script src="../js/main.js"></script>
<script>
  (function(){
    var host = document.getElementById('js-faq');
    if (!host) return;
    host.innerHTML = SITE_DATA.faq.map(function(f, i){
      return '<div class="accordion__item ' + (i===0?'is-open':'') + '">' +
               '<button class="accordion__trigger">' +
                 '<span>Q' + (i+1) + '. ' + f.q + '</span>' +
                 '<i class="fa-solid fa-chevron-down"></i>' +
               '</button>' +
               '<div class="accordion__content">' +
                 '<p style="padding: var(--sp-2) 0;">' + f.a + '</p>' +
               '</div>' +
             '</div>';
    }).join('');
  })();
  JAFM.init('faq', 'faq');
</script>
</body>
</html>
